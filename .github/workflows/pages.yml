name: Deploy Client

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync-engine
      - name: Check Worker WebSocket URL
        run: |
          test -n "${{ vars.WS_BASE }}" || (echo "WS_BASE repo variable is not set" && exit 1)
      - name: Inject Worker WebSocket URL
        run: |
          node scripts/inject-ws-base.mjs "${{ vars.WS_BASE }}"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client
      - id: deployment
        uses: actions/deploy-pages@v4
